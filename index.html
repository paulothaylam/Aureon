<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!-- Bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        

        <!-- CSS -->
        <link href="./src/css/reset.css" rel="stylesheet">
        <link href="./src/css/mainStyle.css" rel="stylesheet">

        <title>Aureon</title>
    </head>

    <body>
        <!-- #region 
        -- BARRA DE NAVEGAÇÃO (nav) --
        Toda barra de navegação fica nessa tag -->
        <nav class="navbar navbar-expand-lg">           
            <div class="container-fluid">
                <a class="navbar-brand text-white text-font-aureon-logo text-logo-aureon" href="#">Aureon</a>
                <button class="navbar-toggler bg-white" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">
                    
                    <ul class="navbar-nav mx-auto text-primary">
                        <li class="navbar-item" aria-current="page">
                            <a class="nav-link text-white" href="#">Explorar Cursos</a>
                        </li>
                        <li class="navbar-item" aria-current="page">
                            <a class="nav-link text-white" href="#">Minhas Abilidades</a>
                        </li>
                        <li class="navbar-item" aria-current="page">
                            <a class="nav-link text-white" href="#">Comunidade</a>
                        </li>
                        <li class="navbar-item" aria-current="page">
                            <a class="nav-link text-white" href="#">Como Funciona</a>
                        </li>
                    </ul>

                    
                    <form class="d-flex ">
                            <button class="btn btn-outline-success me-2" type="button"> Entrar </button>
                            <button class="btn btn-sm btn-outline-secondary" type="button"> Criar Conta </button>
                    </form>
                </div>

            </div>

        </nav>
        <!-- #endregion -->
        
        <!-- #region 
        -- TAG PRINCIPAL (main) -- 
        Para armazenar as informações mais importantes -->
        <main>
            <div class="text-font-aureon-logo text-white text-center py-4 pb-5" id="welcome-text">
                <p class="fs-1"> Seja bem vindo(a) ao </p>
                <p class="display-1"> Aureon </p>
                <p class="fs-5"> Descubra caminhos que você não sabia que existia </p>
            </div>


            <div class="d-flex pb-5 justify-content-center flex-wrap gap-3" id="home-btns">
                <button class="bnt btn-style-aureon" type="button">
                    <i class="bi bi-braces display-5 home-bnt-icons"></i>
                    <p class="fs-6 text-white"> Programação Criativa </p>
                </button>
                <button class="bnt btn-style-aureon" type="button">
                    <i class="bi bi-hand-index-thumb display-5 home-bnt-icons"></i>
                    <p class="fs-6 text-white pt-1"> Desing de Interface </p>
                </button>
                <button class="bnt btn-style-aureon" type="button">
                    <i class="bi bi-stars display-5 home-bnt-icons"></i>
                    <p class="fs-6 text-white pt-1"> Arte Generativa </p>
                </button>
                <button class="bnt btn-style-aureon" type="button">
                    <i class="bi bi-camera-reels display-5 home-bnt-icons"></i>
                    <p class="fs-6 text-white pt-1"> Edição de Vídeo </p>
                </button>
            </div>

            <div class="pb-5" id="featured-cards">
                <div class="d-flex justify-content-between align-items-center" id="featured-cards-header">
                    <p class="text-white fs-2 text-font-aureon-logo"> Cursos em destaque </p>

                    <div id="featured-cards-header-buttons">
                        <button class="btn btn-featured-cards bi bi-caret-left-fill featured-cards-arrows" id="left-arrow"></button>
                        <button class="btn btn-featured-cards bi bi-caret-right-fill featured-cards-arrows" id="right-arrow"></button>
                    </div>
                </div>

                <div class="d-flex px-3 gap-4" id="featured-cards-body">
                    <button class="card bnt bnt-featured-card btn-style-aureon">
                        <img src="./assets/images/cards/ceumacard.jpg" alt="..." class="bnt-featured-card-thumb card-img-top mt-2 rounded">
                        
                        <div class="card-body text-white d-flex px-2 py-0 flex-column justify-content-between">
                            <p class="card-title fs-6 line-clamp-card text-start"> O que é a instituição ceuma no polo renascensa </p>
                            
                            <div class="bnt-featured-card-info pb-2 d-flex justify-content-between">
                                
                                <a href="" class="d-flex gap-1 align-items-center justify-content-center text-decoration-none">
                                    <img src="./assets/images/profile/ceumaofficial.png" alt="..." class="my-0 py-0 rounded-pill img-fluid featured-card-prof-icon">
                                    <p class="text-white py-0 my-0"> ceumaofficial </p>
                                </a>

                                <div class="d-flex align-items-center gap-1 justify-content-center py-0">
                                    <p class="py-0 my-0">5.0</p>
                                    <i class="bi bi-star-fill py-0 my-0"></i>
                                </div>

                            </div>
                        </div>
                    </button>

                </div>
            </div>

            <div >

            </div>
        </main>
        <!-- #endregion -->
        
        <!-- #region
        -- RODAPE (footer) --
        Onde fica as informações extras do website -->
        <footer class="d-flex flex-wrap justify-content-between align-items-center py-3">
            <ul class="nav col-md-4 mb-0 list-unstyled d-flex">
                <li class="nav-item">
                    <a href="" class="nav-link px-2 text-white"> Sobre nós </a>
                </li>
                <li class="nav-item">
                    <a href="" class="nav-link px-2 text-white"> Termos de Serviço </a>
                </li>
            </ul>   

            <a href="" class="  
                col-md-4 mb-3 mb-md-0 me-md-auto text-logo-aureon
                d-flex align-items-center justify-content-center text-white text-decoration-none text-font-aureon-logo">
                Aureon
            </a>

            <ul class="nav fs-4 justify-content-end list-unstyled d-flex col-md-4">
                <li class="ms-3"> <a href="" class="bi bi-instagram"></a> </li>
                <li class="ms-3"> <a href="" class="bi bi-facebook"></a> </li>
                <li class="ms-3"> <a href="" class="bi bi-youtube"></a> </li>
            </ul>
        </footer>
        <!-- #endregion -->

        <!-- #region
        -- SCRIPTS DO JS -- 
        Carregado somente quando a pagina inteira for carregada -->
        <script type="text/javascript" src="./src/js/script.js"></script>
        <!-- #endregion -->
    </body>
</html>
